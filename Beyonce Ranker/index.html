<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beyoncé Song Ranker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=League+Gothic:wdth@87.5&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #D4A4B8;
  --pink-light: #E8C4D4;
  --pink-dim: #9B7088;
  --pink-glow: rgba(212,164,184,0.12);
  --black: #000000;
  --bg: #050505;
  --card-bg: #0E0E0E;
  --card-border: #1A1A1A;
  --text: #E8DDE2;
  --text-dim: #6B5A62;
}

body {
  font-family: 'League Gothic', sans-serif;
  font-weight: 300;
  background: var(--black);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.app {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
  min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
  text-align: center;
  padding: 48px 0 24px;
}

.header h1 {
  font-family: 'League Gothic', sans-serif;
  font-size: clamp(1.8rem, 6vw, 3rem);
  font-weight: 200;
  letter-spacing: 0.5em;
  color: var(--pink);
  text-transform: uppercase;
}

.header .subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin-top: 8px;
}

.divider {
  width: 40px;
  height: 1px;
  background: var(--pink-dim);
  margin: 24px auto;
  opacity: 0.4;
}

/* ===== SCREENS ===== */
.screen { display: none; }
.screen.active { display: block; animation: fadeUp 0.5s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== ALBUM SELECT ===== */
.album-select-intro {
  text-align: center;
  margin-bottom: 28px;
  font-size: 1.5rem;
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.03em;
}

.album-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.album-card {
  position: relative;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid transparent;
  aspect-ratio: 1;
}

.album-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(212,164,184,0.08); }
.album-card.selected { border-color: var(--pink); }

.album-card.selected::after {
  content: '✓';
  position: absolute;
  top: 8px;
  right: 8px;
  width: 24px;
  height: 24px;
  background: var(--pink);
  color: var(--black);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 12px;
  z-index: 3;
}

.album-art-wrapper {
  width: 100%;
  height: 100%;
  position: relative;
}

.album-art-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.album-art-fallback {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
}

.album-art-wrapper img + .album-art-fallback { display: none; }

.album-art-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 14px;
}

.album-card-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 1.2rem;
  text-align: center;
  line-height: 1.2;
  color: var(--text);
  z-index: 2;
}

.album-card-year {
  font-size: 0.9rem;
  color: var(--pink-dim);
  margin-top: 3px;
  font-weight: 300;
  letter-spacing: 0.1em;
  z-index: 2;
}

/* ===== BUTTONS ===== */
.btn {
  font-family: 'League Gothic', sans-serif;
  font-weight: 400;
  font-size: 1.5rem;
  padding: 13px 34px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 0.2em;
}

.btn-pink {
  background: var(--pink);
  color: var(--black);
}
.btn-pink:hover { background: var(--pink-light); }
.btn-pink:disabled {
  background: #1A1A1A;
  color: #444;
  cursor: not-allowed;
}

.btn-outline {
  background: transparent;
  color: var(--pink);
  border: 1px solid var(--pink-dim);
}
.btn-outline:hover { background: var(--pink-glow); }

.btn-container {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 20px 0;
}

.song-count-label {
  text-align: center;
  color: var(--text-dim);
  font-size: 1.5rem;
  margin-bottom: 18px;
  letter-spacing: 0.05em;
}

/* ===== BATTLE SCREEN ===== */
.progress-section {
  text-align: center;
  margin-bottom: 28px;
}

.progress-bar-track {
  width: 100%;
  height: 2px;
  background: #1A1A1A;
  overflow: hidden;
  margin: 12px 0 8px;
}

.progress-bar-fill {
  height: 100%;
  background: var(--pink);
  transition: width 0.4s ease;
}

.progress-text {
  font-size: 1rem;
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 0.08em;
}

.battle-arena {
  display: flex;
  align-items: stretch;
  gap: 14px;
  margin: 20px 0;
  min-height: 340px;
}

.battle-card {
  flex: 1;
  background: var(--card-bg);
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
  border: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
}

.battle-card:hover {
  border-color: var(--pink);
  box-shadow: 0 0 30px rgba(212,164,184,0.08);
}

.battle-card:active { transform: scale(0.97); }

.battle-card .card-cover {
  width: 100%;
  aspect-ratio: 1;
  position: relative;
  overflow: hidden;
}

.battle-card .card-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.battle-card .card-cover .cover-fallback {
  width: 100%;
  height: 100%;
  position: absolute;
  inset: 0;
}

.battle-card .card-cover img + .cover-fallback { display: none; }

.battle-card .card-cover::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60%;
  background: linear-gradient(to top, var(--card-bg) 0%, transparent 100%);
}

.battle-card-info {
  padding: 0 20px 24px;
  text-align: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  margin-top: -16px;
  position: relative;
  z-index: 2;
}

.battle-song-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.05rem, 3vw, 1.4rem);
  font-weight: 600;
  line-height: 1.2;
  margin-bottom: 6px;
  color: var(--text);
}

.battle-album-name {
  font-size: 1rem;
  color: var(--pink-dim);
  font-weight: 300;
  letter-spacing: 0.08em;
}

.vs-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.vs-badge span {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  font-style: italic;
  color: var(--text-dim);
  font-weight: 300;
}

.skip-btn-container { text-align: center; margin-top: 10px; }

.skip-btn {
  font-family: 'League Gothic', sans-serif;
  background: none;
  border: 1px solid #1A1A1A;
  color: var(--text-dim);
  padding: 10px 28px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 0.99rem;
  font-weight: 300;
  transition: all 0.3s ease;
  letter-spacing: 0.08em;
}

.skip-btn:hover { border-color: #333; color: var(--text); }

.end-early-container { text-align: center; margin-top: 16px; }

.end-early-btn {
  font-family: 'League Gothic', sans-serif;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.75rem;
  font-weight: 300;
  letter-spacing: 0.05em;
  transition: color 0.2s;
  text-decoration: none;
  border-bottom: 1px solid var(--card-border);
  padding-bottom: 2px;
}

.end-early-btn:hover { color: var(--pink-dim); }

/* ===== RESULTS ===== */
.results-tabs {
  display: flex;
  justify-content: center;
  gap: 0;
  margin-bottom: 28px;
  max-width: 320px;
  margin-left: auto;
  margin-right: auto;
  border-bottom: 1px solid #1A1A1A;
}

.results-tab {
  font-family: 'League Gothic', sans-serif;
  flex: 1;
  padding: 12px 20px;
  border: none;
  background: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.99rem;
  font-weight: 400;
  transition: all 0.3s ease;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
}

.results-tab.active {
  color: var(--pink);
  border-bottom-color: var(--pink);
}

.results-list { list-style: none; }

.result-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px 14px;
  border-radius: 3px;
  margin-bottom: 4px;
  background: var(--card-bg);
  border: 1px solid transparent;
  transition: all 0.3s ease;
  animation: fadeUp 0.4s ease backwards;
}

.result-item:hover { background: #121212; }

.result-rank {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--pink-dim);
  min-width: 36px;
  text-align: center;
}

.result-item:nth-child(1) .result-rank {
  font-size: 1.6rem;
  color: var(--pink);
}

.result-item:nth-child(1) {
  border-color: rgba(212,164,184,0.15);
  margin-bottom: 8px;
}

.result-item:nth-child(1) .result-rank::before {
  content: '♛';
  display: block;
  font-size: 1rem;
  line-height: 1;
  margin-bottom: 2px;
  color: var(--pink);
}

.result-art {
  width: 44px;
  height: 44px;
  border-radius: 3px;
  flex-shrink: 0;
  overflow: hidden;
}

.result-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.result-art .result-art-fallback {
  width: 100%;
  height: 100%;
}

.result-art img + .result-art-fallback { display: none; }

.result-info { flex: 1; min-width: 0; }

.result-song {
  font-weight: 200;
  font-size: 1.5rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.result-album {
  font-size: 1.2rem;
  color: var(--text-dim);
  margin-top: 2px;
  font-weight: 200;
}

.result-elo {
  font-size: 1.2rem;
  color: var(--text-dim);
  font-weight: 200;
  min-width: 44px;
  text-align: right;
  letter-spacing: 0.03em;
}

/* Album results */
.album-result-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px;
  border-radius: 4px;
  margin-bottom: 8px;
  background: var(--card-bg);
  animation: fadeUp 0.4s ease backwards;
}

.album-result-art {
  width: 64px;
  height: 64px;
  border-radius: 3px;
  flex-shrink: 0;
  overflow: hidden;
}

.album-result-art img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.album-result-art .album-result-fallback {
  width: 100%;
  height: 100%;
}

.album-result-art img + .album-result-fallback { display: none; }

.album-result-info { flex: 1; }

.album-result-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.album-result-score {
  font-size: 0.99rem;
  color: var(--text-dim);
  font-weight: 300;
}

.album-result-rank {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 600;
  color: var(--pink-dim);
  min-width: 44px;
  text-align: center;
}

.album-result-card:first-child .album-result-rank { color: var(--pink); }

.album-result-bar {
  height: 2px;
  border-radius: 1px;
  margin-top: 8px;
  background: var(--pink-dim);
  transition: width 0.6s ease;
}

/* Share */
.share-section {
  text-align: center;
  margin-top: 40px;
  padding: 28px;
  background: var(--card-bg);
  border-radius: 4px;
  border: 1px solid var(--card-border);
}

.share-section h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--pink);
}

.share-section p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-bottom: 14px;
  font-weight: 300;
}

.share-text {
  background: var(--black);
  border: 1px solid #1A1A1A;
  border-radius: 3px;
  padding: 16px;
  font-family: 'League Gothic', sans-serif;
  font-size: 0.99rem;
  font-weight: 300;
  color: var(--text);
  white-space: pre-wrap;
  text-align: left;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 14px;
  letter-spacing: 0.02em;
  line-height: 1.6;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .battle-arena { flex-direction: column; min-height: auto; }
  .battle-card .card-cover { aspect-ratio: 2/1; }
  .vs-badge { padding: 4px 0; }
  .album-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .header { padding: 28px 0 12px; }
  .app { padding: 14px; }
}

/* ===== ANIMATIONS ===== */
.battle-card.choosing { animation: chosen 0.3s ease; }

@keyframes chosen {
  0% { transform: scale(1); }
  50% { transform: scale(0.96); border-color: var(--pink); box-shadow: 0 0 30px rgba(212,164,184,0.15); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <h1>Beyoncé</h1>
    <div class="subtitle">song ranker</div>
    <div class="divider"></div>
  </div>

  <!-- SCREEN 1: ALBUM SELECT -->
  <div class="screen active" id="screen-select">
    <p class="album-select-intro">Choose which albums to include</p>
    <div class="album-grid" id="album-grid"></div>
    <p class="song-count-label" id="song-count-label">0 songs selected</p>
    <div class="btn-container">
      <button class="btn btn-outline" id="btn-select-all">Select All</button>
      <button class="btn btn-pink" id="btn-start" disabled>Start Ranking</button>
    </div>
  </div>

  <!-- SCREEN 2: BATTLE -->
  <div class="screen" id="screen-battle">
    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <p class="progress-text" id="progress-text">Matchup 1 of 100</p>
    </div>

    <div class="battle-arena" id="battle-arena">
      <div class="battle-card" id="card-left" onclick="pick('left')">
        <div class="card-cover" id="cover-left"></div>
        <div class="battle-card-info">
          <div class="battle-song-title" id="title-left"></div>
          <div class="battle-album-name" id="album-left"></div>
        </div>
      </div>
      <div class="vs-badge"><span>vs</span></div>
      <div class="battle-card" id="card-right" onclick="pick('right')">
        <div class="card-cover" id="cover-right"></div>
        <div class="battle-card-info">
          <div class="battle-song-title" id="title-right"></div>
          <div class="battle-album-name" id="album-right"></div>
        </div>
      </div>
    </div>

    <div class="skip-btn-container">
      <button class="skip-btn" onclick="pick('skip')">Don't know either song</button>
    </div>
    <div class="end-early-container">
      <button class="end-early-btn" onclick="endEarly()">See my results so far</button>
    </div>
  </div>

  <!-- SCREEN 3: RESULTS -->
  <div class="screen" id="screen-results">
    <div class="results-tabs">
      <button class="results-tab active" onclick="showTab('songs')">Songs</button>
      <button class="results-tab" onclick="showTab('albums')">Albums</button>
    </div>
    <div id="tab-songs"><ul class="results-list" id="results-songs"></ul></div>
    <div id="tab-albums" style="display:none"><div id="results-albums"></div></div>
    <div class="share-section">
      <h3>Share Your Ranking</h3>
      <p>Copy and send to the group chat</p>
      <div class="share-text" id="share-text"></div>
      <button class="btn btn-pink" onclick="copyResults()">Copy to Clipboard</button>
    </div>
    <div class="btn-container" style="margin-top:24px">
      <button class="btn btn-outline" onclick="restart()">Rank Again</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// ALBUM DATA
// ============================================================
// Cover images: place files in a "covers/" folder next to this HTML.
// Name them exactly as the "cover" field below.
// If a file is missing the app will show a color gradient instead.
// ============================================================
const ALBUMS = [
  {
    id:'dangerously-in-love', name:'Dangerously in Love', year:2003,
    cover:'covers/dangerously-in-love.png',
    gradient:'linear-gradient(135deg,#E8E0D0,#A89888)',
    songs:['Crazy in Love','Naughty Girl','Baby Boy','Hip Hop Star','Be with You','Me, Myself and I','Yes','Signs','Speechless','Dangerously in Love 2','Gift from Virgo','Daddy']
  },
  {
    id:'bday', name:"B'Day", year:2006,
    cover:'covers/bday.png',
    gradient:'linear-gradient(135deg,#2D5A27,#F0E68C)',
    songs:['Déjà Vu','Get Me Bodied','Suga Mama','Upgrade U','Ring the Alarm','Kitty Kat','Freakum Dress','Green Light','Irreplaceable','Resentment','Check on it', 'Beautiful Liar']
  },
  {
    id:'i-am-sasha-fierce', name:'I Am... Sasha Fierce', year:2008,
    cover:'covers/i-am-sasha-fierce.png',
    gradient:'linear-gradient(135deg,#C0C0C0,#707070)',
    songs:['If I Were a Boy','Halo','Disappear','Broken-Hearted Girl','Ave Maria','Smash into You','Satellites','Single Ladies','Radio','Diva','Sweet Dreams','Video Phone','Hello','Ego','Why Don\'t You Want Me']
  },
  {
    id:'4', name:'4', year:2011,
    cover:'covers/4.png',
    gradient:'linear-gradient(135deg,#1A2744,#6B88C4)',
    songs:['1+1','I Care','Best Thing I Never Had','Party','Love on Top','Rather Die Young','Start Over','End of Time','I Was Here','Run the World (Girls)','Countdown']
  },
  {
    id:'beyonce', name:'Beyoncé', year:2013,
    cover:'covers/beyonce.png',
    gradient:'linear-gradient(135deg,#1A1A1A,#3A3A3A)',
    songs:['Pretty Hurts','Haunted','Drunk in Love','Blow','No Angel','Partition','Jealous','Rocket','Mine','XO','***Flawless','Superpower','Heaven','Blue']
  },
  {
    id:'lemonade', name:'Lemonade', year:2016,
    cover:'covers/lemonade.png',
    gradient:'linear-gradient(135deg,#C9A84C,#F0D860)',
    songs:['Pray You Catch Me','Hold Up','Don\'t Hurt Yourself','Sorry','6 Inch','Daddy Lessons','Love Drought','Sandcastles','Forward','Freedom','All Night','Formation']
  },
  {
    id:'renaissance', name:'Renaissance', year:2022,
    cover:'covers/renaissance.png',
    gradient:'linear-gradient(135deg,#8B8B8B,#A0D0E0)',
    songs:['I\'m That Girl','Cozy','Alien Superstar','Cuff It','Energy','Break My Soul','Church Girl','Plastic Off the Sofa','Virgo\'s Groove','Move','Heated','Thique','All Up in Your Mind','America Has a Problem','Pure/Honey','Summer Renaissance', 'My House']
  },
  {
    id:'cowboy-carter', name:'Cowboy Carter', year:2024,
    cover:'covers/cowboy-carter.png',
    gradient:'linear-gradient(135deg,#C41E3A,#2E4A7A)',
    songs:['Ameriican Requiem','Blackbiird','16 Carriages','Protector','My Rose','Texas Hold \'Em','Bodyguard','Jolene','Daughter','Spaghettii','Alligator Tears','Just for Fun','II Most Wanted','Levii\'s Jeans','Flamenco','Ya Ya','Oh Louisiana','Desert Eagle','Riiverdance','II Hands II Heaven','Tyrant','Sweet Honey Buckiin\'','Amen']
  }
];

const albumMap = {};
ALBUMS.forEach(a => albumMap[a.id] = a);

// ===== STATE =====
let selectedAlbums = new Set();
let songs = [];
let matchupIndex = 0;
let totalMatchups = 0;
let currentPair = [null, null];
let removedSongs = new Set();

// ===== HELPERS =====
function coverHTML(albumId, cls) {
  const a = albumMap[albumId];
  return `<img src="${a.cover}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <div class="${cls}" style="display:none;background:${a.gradient};width:100%;height:100%"></div>`;
}

// ===== INIT =====
function init() {
  const grid = document.getElementById('album-grid');
  grid.innerHTML = '';
  ALBUMS.forEach(album => {
    const card = document.createElement('div');
    card.className = 'album-card';
    card.innerHTML = `
      <div class="album-art-wrapper">
        <img src="${album.cover}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="album-art-fallback" style="display:none;background:${album.gradient}"></div>
        <div class="album-art-overlay">
          <div class="album-card-title">${album.name}</div>
          <div class="album-card-year">${album.year}</div>
        </div>
      </div>`;
    card.onclick = () => toggleAlbum(album.id, card);
    grid.appendChild(card);
  });
  document.getElementById('btn-select-all').onclick = selectAll;
  document.getElementById('btn-start').onclick = startRanking;
}

function toggleAlbum(id, card) {
  selectedAlbums.has(id) ? (selectedAlbums.delete(id), card.classList.remove('selected'))
                         : (selectedAlbums.add(id), card.classList.add('selected'));
  updateCount();
}

function selectAll() {
  const cards = document.querySelectorAll('.album-card');
  const all = selectedAlbums.size === ALBUMS.length;
  if (all) { selectedAlbums.clear(); cards.forEach(c=>c.classList.remove('selected')); }
  else { ALBUMS.forEach(a=>selectedAlbums.add(a.id)); cards.forEach(c=>c.classList.add('selected')); }
  updateCount();
}

function updateCount() {
  let n = 0;
  ALBUMS.forEach(a => { if (selectedAlbums.has(a.id)) n += a.songs.length; });
  document.getElementById('song-count-label').textContent = `${n} songs selected`;
  document.getElementById('btn-start').disabled = n < 4;
}

// ===== RANKING =====
function startRanking() {
  songs = [];
  ALBUMS.forEach(album => {
    if (!selectedAlbums.has(album.id)) return;
    album.songs.forEach(title => {
      songs.push({ title, album:album.name, albumId:album.id, elo:1200, matches:0, wins:0 });
    });
  });
  removedSongs = new Set();
  matchupIndex = 0;
  totalMatchups = Math.round(songs.length * 2);
  showScreen('screen-battle');
  nextMatchup();
}

function getActive() { return songs.filter((_,i)=>!removedSongs.has(i)); }

function nextMatchup() {
  if (matchupIndex >= totalMatchups || getActive().length < 2) { showResults(); return; }
  const active = getActive();
  if (active.length < 2) { showResults(); return; }
  const sorted = [...active].sort((a,b)=>a.matches-b.matches);
  const pool = sorted.slice(0, Math.max(4, Math.ceil(sorted.length*0.5)));
  let a = pool[Math.floor(Math.random()*pool.length)];
  let b, tries=0;
  do { b = active[Math.floor(Math.random()*active.length)]; tries++; } while(b===a && tries<50);
  if (b===a) { showResults(); return; }
  currentPair = [songs.indexOf(a), songs.indexOf(b)];
  updateBattle(a, b);
  updateProgress();
}

function updateBattle(a, b) {
  document.getElementById('title-left').textContent = a.title;
  document.getElementById('album-left').textContent = a.album;
  document.getElementById('cover-left').innerHTML = coverHTML(a.albumId, 'cover-fallback');

  document.getElementById('title-right').textContent = b.title;
  document.getElementById('album-right').textContent = b.album;
  document.getElementById('cover-right').innerHTML = coverHTML(b.albumId, 'cover-fallback');
}

function updateProgress() {
  const pct = Math.min(100, (matchupIndex/totalMatchups)*100);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `Matchup ${matchupIndex+1} of ${totalMatchups}`;
}

function pick(choice) {
  const [iA,iB] = currentPair;
  if (choice==='skip') {
    removedSongs.add(iA); removedSongs.add(iB);
  } else {
    const w = choice==='left'?songs[iA]:songs[iB];
    const l = choice==='left'?songs[iB]:songs[iA];
    const K=40, eW=1/(1+Math.pow(10,(l.elo-w.elo)/400)), eL=1-eW;
    w.elo+=K*(1-eW); l.elo+=K*(0-eL); w.wins++; w.matches++; l.matches++;
    const card = choice==='left'?'card-left':'card-right';
    document.getElementById(card).classList.add('choosing');
    setTimeout(()=>document.getElementById(card).classList.remove('choosing'),300);
  }
  matchupIndex++;
  setTimeout(nextMatchup,200);
}

function endEarly() { showResults(); }

// ===== RESULTS =====
function showResults() {
  showScreen('screen-results');
  const active = songs.filter((_,i)=>!removedSongs.has(i));
  const ranked = [...active].sort((a,b)=>b.elo-a.elo);

  const songList = document.getElementById('results-songs');
  songList.innerHTML = '';
  ranked.forEach((s,i) => {
    const li = document.createElement('li');
    li.className = 'result-item';
    li.style.animationDelay = `${i*0.03}s`;
    li.innerHTML = `
      <div class="result-rank">${i+1}</div>
      <div class="result-art">${coverHTML(s.albumId,'result-art-fallback')}</div>
      <div class="result-info">
        <div class="result-song">${s.title}</div>
        <div class="result-album">${s.album}</div>
      </div>
      <div class="result-elo">${Math.round(s.elo)}</div>`;
    songList.appendChild(li);
  });

  const albumScores = {};
  active.forEach(s => {
    if (!albumScores[s.albumId]) albumScores[s.albumId]={name:s.album,id:s.albumId,total:0,count:0};
    albumScores[s.albumId].total+=s.elo; albumScores[s.albumId].count++;
  });
  const albumRanked = Object.values(albumScores).map(a=>({...a,avg:a.total/a.count})).sort((a,b)=>b.avg-a.avg);
  const maxA=albumRanked[0]?.avg||1200, minA=albumRanked[albumRanked.length-1]?.avg||1200, range=maxA-minA||1;

  const albumDiv = document.getElementById('results-albums');
  albumDiv.innerHTML = '';
  albumRanked.forEach((a,i) => {
    const bar = ((a.avg-minA)/range)*80+20;
    const card = document.createElement('div');
    card.className = 'album-result-card';
    card.style.animationDelay = `${i*0.06}s`;
    card.innerHTML = `
      <div class="album-result-rank">${i+1}</div>
      <div class="album-result-art">${coverHTML(a.id,'album-result-fallback')}</div>
      <div class="album-result-info">
        <div class="album-result-name">${a.name}</div>
        <div class="album-result-score">Avg score: ${Math.round(a.avg)} · ${a.count} songs ranked</div>
        <div class="album-result-bar" style="width:${bar}%"></div>
      </div>`;
    albumDiv.appendChild(card);
  });

  const top5=ranked.slice(0,5), bot3=ranked.slice(-3).reverse();
  let txt=`🐝 My Beyoncé Song Ranking 🐝\n\n👑 TOP 5:\n`;
  top5.forEach((s,i)=>txt+=`${i+1}. ${s.title} (${s.album})\n`);
  txt+=`\n📀 ALBUM RANKING:\n`;
  albumRanked.forEach((a,i)=>txt+=`${i+1}. ${a.name}\n`);
  txt+=`\n🔻 BOTTOM 3:\n`;
  bot3.forEach((s,i)=>txt+=`${ranked.length-2+i}. ${s.title} (${s.album})\n`);
  document.getElementById('share-text').textContent = txt;
  showTab('songs');
}

function showTab(tab) {
  document.querySelectorAll('.results-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-songs').style.display = tab==='songs'?'':'none';
  document.getElementById('tab-albums').style.display = tab==='albums'?'':'none';
  document.querySelectorAll('.results-tab')[tab==='songs'?0:1].classList.add('active');
}

function copyResults() {
  const text = document.getElementById('share-text').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    const b=event.target; b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy to Clipboard',2000);
  }).catch(()=>{ const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); });
}

function restart() { selectedAlbums.clear(); showScreen('screen-select'); init(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
</script>
</body>
</html>
